name = "payment-manager"
main = ".open-next/worker.js"
compatibility_date = "2025-06-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ============================================================================
# REQUIRED SECRETS — never put values in this file.
# Set via `wrangler secret put` for production.
#
#   wrangler secret put PAYMENT_MANAGER_SESSION_SECRET
#   wrangler secret put PAYMENT_MANAGER_ADMIN_TOKEN
#   wrangler secret put PAYMENT_MANAGER_ENCRYPTION_KEY
#   wrangler secret put DATABASE_URL
#   wrangler secret put PAYMENT_MANAGER_ALLOWED_IPS
#   wrangler secret put CARYINA_INTERNAL_TOKEN
#   wrangler secret put CARYINA_PM_TOKEN
#   wrangler secret put PAYMENT_MANAGER_INTERNAL_TOKEN
#
# DATABASE_URL format (Neon serverless Postgres):
#   postgresql://user:pass@<project>.neon.tech/<dbname>?sslmode=require
# The Prisma client uses @prisma/adapter-neon in this Worker runtime so that
# HTTP-based connections are used instead of TCP (TCP is blocked in V8 isolates).
# ============================================================================

[[kv_namespaces]]
binding = "PAYMENT_MANAGER_KV"
id = "e47d7e7c21f44fcfb86f0da9bc3b0910"

[vars]
PAYMENTS_BACKEND = "prisma"
PAYMENTS_LOCAL_FS_DISABLED = "1"
CART_FEATURE_ENABLED = "false"
