name = "reception"
main = "worker-entry.ts"
compatibility_date = "2025-06-20"
compatibility_flags = ["nodejs_compat"]

# Local release path:
#   pnpm --filter @apps/reception deploy:worker:safe
# This loads apps/reception/.env.local for NEXT_PUBLIC_FIREBASE_* build vars and
# repo-root .env.local for CLOUDFLARE_* deploy auth, then fails closed if either
# set is missing.

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[custom_domains]]
hostname = "reception.hostel-positano.com"

# ============================================================================
# REQUIRED SECRETS — never put values in this file.
# Set via `wrangler secret put` before deploying.
#
# Firebase (all NEXT_PUBLIC_ vars are baked into client bundles at build time;
# set these in your build environment, not here):
#   wrangler secret put RECEPTION_FIREBASE_API_KEY
#   wrangler secret put RECEPTION_FIREBASE_DATABASE_URL
#   wrangler secret put RECEPTION_FIREBASE_ARCHIVE_DATABASE_URL
#
# Gmail inbox sync (OAuth credentials for hostel inbox email):
#   wrangler secret put GMAIL_CLIENT_ID
#   wrangler secret put GMAIL_CLIENT_SECRET
#   wrangler secret put GMAIL_REFRESH_TOKEN
#
# Guest matching (optional — only if Firebase RTDB blocks unauthenticated reads):
#   wrangler secret put FIREBASE_DB_SECRET
#
# Inbox cron auth (required for automatic inbox sync/recovery):
#   wrangler secret put INBOX_SYNC_SECRET
# Fallback for backward compatibility:
#   wrangler secret put INBOX_RECOVERY_SECRET
#
# Optional recovery configuration (set via [vars] or wrangler secret):
#   INBOX_RECOVERY_STALE_HOURS  — hours before a thread is considered stuck (default: 2)
#   INBOX_RECOVERY_ENABLED      — set to "false" to disable recovery (default: enabled)
#   INBOX_AUTO_SYNC_ENABLED     — set to "false" to disable scheduled inbox sync (default: enabled)
#
# Prime messaging — actor claims signing (required for Prime inbox actions):
#   wrangler secret put RECEPTION_PRIME_API_BASE_URL
#   wrangler secret put RECEPTION_PRIME_ACCESS_TOKEN
#   wrangler secret put PRIME_ACTOR_CLAIMS_SECRET
#
#   PRIME_ACTOR_CLAIMS_SECRET rules:
#     - Must be ≥32 characters (shorter values → Prime returns 503 on all mutations)
#     - Must NOT equal PRIME_STAFF_OWNER_GATE_TOKEN (secret independence)
#   Generate: openssl rand -base64 48 | tr -d '\n'
#   Both Reception (signer) and Prime (verifier) must share the same value.
#   See: docs/plans/prime-outbound-auth-hardening/plan.md
# ============================================================================

[[d1_databases]]
binding = "RECEPTION_INBOX_DB"
database_name = "reception-inbox"
database_id = "f3ed1b8f-cb6a-4950-9bfa-8f85a0913db9"

[triggers]
crons = ["* * * * *", "*/30 * * * *"]

[vars]
# Server-side runtime vars. NEXT_PUBLIC_ vars must be set at build time.
# See apps/reception/.env.example for full variable reference.
