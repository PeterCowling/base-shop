name = "inventory-uploader"
main = ".open-next/worker.js"
compatibility_date = "2025-06-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ============================================================================
# REQUIRED SECRETS — never put values in this file.
# Set via `wrangler secret put` for production.
#
#   wrangler secret put INVENTORY_SESSION_SECRET
#   wrangler secret put INVENTORY_ADMIN_TOKEN
#   wrangler secret put DATABASE_URL
#   wrangler secret put INVENTORY_ALLOWED_IPS
#
# DATABASE_URL format (Neon serverless Postgres):
#   postgresql://user:pass@<project>.neon.tech/<dbname>?sslmode=require
# The Prisma client uses @prisma/adapter-neon in this Worker runtime so that
# HTTP-based connections are used instead of TCP (TCP is blocked in V8 isolates).
# ============================================================================

[[kv_namespaces]]
binding = "INVENTORY_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
# Create with: wrangler kv:namespace create INVENTORY_KV

[vars]
INVENTORY_LOCAL_FS_DISABLED = "1"
