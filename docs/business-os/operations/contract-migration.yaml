---
# Business OS Contract Operations
#
# Migration window (stage-key aliases, filename aliases, dual-read) completed
# and removed 2026-03-12. All stage-doc writes now use canonical keys only.

# Stage Addressing Resolver Contract
#
# Business OS keeps this metadata only as documentation of the historical alias
# migration. Runtime stage-doc normalization uses the build-time generated module
# above and does not depend on startup-loop state.
stage_addressing:
  resolver_module: "scripts/src/startup-loop/stage-addressing.ts"
  canonical_alias_source: "docs/business-os/startup-loop/_generated/stage-operator-map.json"
  modes:
    - id: id
      flag: "--stage"
      behavior: "canonical-always"
      fallback: suggest_alias
    - id: alias
      flag: "--stage-alias"
      behavior: "fail-closed"
      fallback: deterministic_suggestions
    - id: label
      flag: "--stage-label"
      behavior: "exact-match-only"
      fallback: canonical_label_list
---
