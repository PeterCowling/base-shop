name: Brikette Live Usability Smoke

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/brikette-live-usability-smoke.yml"
      - "apps/brikette/package.json"
      - "apps/brikette/playwright.config.ts"
      - "apps/brikette/scripts/e2e/brikette-live-usability.mjs"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test"
        required: false
        default: "https://hostel-positano.com"
        type: string
      project_set:
        description: "Playwright browser matrix"
        required: false
        default: "cross-browser"
        type: choice
        options:
          - chromium
          - cross-browser
  schedule:
    - cron: "0 7 * * 2"

concurrency:
  group: brikette-live-usability-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-usability-smoke:
    name: Production usability smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BRIKETTE_PLAYWRIGHT_PROJECT_SET: ${{ github.event_name == 'workflow_dispatch' && inputs.project_set || 'cross-browser' }}
      PLAYWRIGHT_BASE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.base_url || 'https://hostel-positano.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-repo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}

      - name: Install Playwright browsers
        run: pnpm --filter @apps/brikette exec playwright install chromium firefox webkit --with-deps

      - name: Run live usability smoke suite
        run: pnpm --filter @apps/brikette e2e:site-usability

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brikette-live-usability-smoke-artifacts
          path: |
            apps/brikette/test-results
            apps/brikette/playwright-report
          if-no-files-found: warn
