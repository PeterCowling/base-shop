name: Deploy Brikette

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - "apps/brikette/**"
      - "packages/design-system/**"
      - "packages/design-tokens/**"
      - "packages/email/**"
      - "packages/guide-system/**"
      - "packages/guides-core/**"
      - "packages/i18n/**"
      - "packages/lib/**"
      - "packages/next-config/**"
      - "packages/platform-core/**"
      - "packages/seo/**"
      - "packages/telemetry/**"
      - "packages/types/**"
      - "packages/ui/**"
      - "lighthouserc.brikette.json"
      - "lighthouserc.brikette.desktop.json"
      - ".github/workflows/brikette.yml"
      - "scripts/brikette/build-static-export.sh"
      - "scripts/post-deploy-brikette-cache-check.sh"
      - "scripts/post-deploy-health-check.sh"
  pull_request:
    paths:
      - "apps/brikette/**"
      - "packages/design-system/**"
      - "packages/design-tokens/**"
      - "packages/email/**"
      - "packages/guide-system/**"
      - "packages/guides-core/**"
      - "packages/i18n/**"
      - "packages/lib/**"
      - "packages/next-config/**"
      - "packages/platform-core/**"
      - "packages/seo/**"
      - "packages/telemetry/**"
      - "packages/types/**"
      - "packages/ui/**"
      - "lighthouserc.brikette.json"
      - "lighthouserc.brikette.desktop.json"
      - ".github/workflows/brikette.yml"
      - "scripts/brikette/build-static-export.sh"
      - "scripts/post-deploy-brikette-cache-check.sh"
      - "scripts/post-deploy-health-check.sh"

concurrency:
  group: brikette-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect publish surface changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      deploy_surface_changed: ${{ steps.classify.outputs.deploy_surface_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" > /tmp/brikette-changed-files.txt 2>/dev/null || : > /tmp/brikette-changed-files.txt
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${{ github.event.before }}..${{ github.sha }}" > /tmp/brikette-changed-files.txt 2>/dev/null || : > /tmp/brikette-changed-files.txt
          else
            git diff --name-only HEAD^ HEAD > /tmp/brikette-changed-files.txt 2>/dev/null || : > /tmp/brikette-changed-files.txt
          fi

          deploy_surface_changed=false

          while IFS= read -r path; do
            case "$path" in
              apps/brikette/*|packages/design-system/*|packages/design-tokens/*|packages/email/*|packages/guide-system/*|packages/guides-core/*|packages/i18n/*|packages/lib/*|packages/next-config/*|packages/platform-core/*|packages/seo/*|packages/telemetry/*|packages/types/*|packages/ui/*|lighthouserc.brikette.json|lighthouserc.brikette.desktop.json)
                deploy_surface_changed=true
                break
                ;;
            esac
          done < /tmp/brikette-changed-files.txt

          echo "deploy_surface_changed=$deploy_surface_changed" >> "$GITHUB_OUTPUT"

  security-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-repo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}
      - name: Run pnpm audit (high/critical)
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            pnpm audit --audit-level=high --ignore GHSA-p6mc-m468-83gw && break
            if [[ $i -lt 3 ]]; then
              echo "pnpm audit attempt $i failed, retrying in $((i * 30))s..."
              sleep $((i * 30))
            else
              exit 1
            fi
          done

  secret-scanning:
    name: Secret scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@v3.93.1
        with:
          extra_args: --only-verified

  validate:
    name: Validate (changed scope)
    needs: changes
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/dev' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-repo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}
      - name: Configure turbo affected range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if ! git rev-parse --verify "origin/${{ github.base_ref }}" >/dev/null 2>&1; then
              git fetch --no-tags origin "+${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
            fi
            echo "TURBO_SCM_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
          else
            if [[ "${{ github.ref_name }}" == "dev" ]]; then
              if ! git rev-parse --verify "origin/main" >/dev/null 2>&1; then
                git fetch --no-tags origin "+main:refs/remotes/origin/main"
              fi
              echo "TURBO_SCM_BASE=origin/main" >> "$GITHUB_ENV"
            else
              echo "TURBO_SCM_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            fi
          fi
          echo "TURBO_SCM_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
      - name: Lint (affected workspaces)
        run: pnpm exec turbo run lint --affected
      - name: Typecheck (affected workspaces)
        run: pnpm exec turbo run typecheck --affected
      - name: Unit tests (affected workspaces)
        env:
          BASESHOP_TEST_TIMEOUT_SEC: "0"
        run: pnpm test:affected

  deploy-staging:
    name: Deploy (staging)
    needs: [changes, security-audit, secret-scanning]
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/staging' &&
        needs.changes.outputs.deploy_surface_changed == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: staging-pages
      url: https://staging.${{ vars.BRIKETTE_PAGES_PROJECT || 'brikette-website' }}.pages.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-repo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}
      - name: Build Brikette static export
        env:
          BRIKETTE_BUILD_LANGS: "en,it"
          BRIKETTE_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID_STAGING || vars.NEXT_PUBLIC_GA_MEASUREMENT_ID || '' }}
        run: bash scripts/brikette/build-static-export.sh
      - name: Deploy to Cloudflare Pages (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/brikette
          pnpm exec wrangler pages deploy out \
            --project-name "${{ vars.BRIKETTE_PAGES_PROJECT || 'brikette-website' }}" \
            --branch staging

  deploy-production:
    name: Deploy (production)
    needs: [changes, security-audit, secret-scanning]
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        needs.changes.outputs.deploy_surface_changed == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: production
      url: https://hostel-positano.com
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-repo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}
      - name: Build Brikette static export
        env:
          BRIKETTE_ENABLE_LIVE_AVAILABILITY: "1"
          BRIKETTE_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID_PRODUCTION || vars.NEXT_PUBLIC_GA_MEASUREMENT_ID || '' }}
        run: bash scripts/brikette/build-static-export.sh
      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/brikette
          pnpm exec wrangler pages deploy out \
            --project-name "${{ vars.BRIKETTE_PAGES_PROJECT || 'brikette-website' }}" \
            --branch main
      - name: Post-deploy health check
        env:
          BASE_URL: https://hostel-positano.com
          EXTRA_ROUTES: /api/health /api/availability?checkin=2026-05-01&checkout=2026-05-03&pax=1
          STRICT_ROUTES: /it/prenota /it/prenota-alloggi-privati
          CANONICAL_ORIGIN: https://hostel-positano.com
          CANONICAL_TAG_ROUTES: /it/prenota /it/prenota-alloggi-privati /it/camere-private/appartamento-vista-mare /en/private-rooms/sea-view-apartment /ja/annai
          SITEMAP_REQUIRED_ROUTES: /it/prenota /it/prenota-alloggi-privati /it/camere-private/appartamento-vista-mare /it/camere-private/camera-doppia /en/private-rooms/sea-view-apartment /ja/annai
          EXPECT_404_ROUTES: /it/book
          MAX_RETRIES: "10"
          RETRY_DELAY: "6"
        run: bash scripts/post-deploy-health-check.sh "${{ vars.BRIKETTE_PAGES_PROJECT || 'brikette-website' }}"
      - name: Post-deploy cache headers check
        continue-on-error: true
        env:
          BASE_URL: https://hostel-positano.com
        run: bash scripts/post-deploy-brikette-cache-check.sh "${{ vars.BRIKETTE_PAGES_PROJECT || 'brikette-website' }}"
