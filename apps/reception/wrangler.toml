name = "reception"
main = ".open-next/worker.js"
compatibility_date = "2025-06-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[custom_domains]]
hostname = "reception.hostel-positano.com"

# ============================================================================
# REQUIRED SECRETS — never put values in this file.
# Set via `wrangler secret put` before deploying.
#
# Firebase (all NEXT_PUBLIC_ vars are baked into client bundles at build time;
# set these in your build environment, not here):
#   wrangler secret put RECEPTION_FIREBASE_API_KEY
#   wrangler secret put RECEPTION_FIREBASE_DATABASE_URL
#   wrangler secret put RECEPTION_FIREBASE_ARCHIVE_DATABASE_URL
# ============================================================================

[vars]
# Server-side runtime vars. NEXT_PUBLIC_ vars must be set at build time.
# See apps/reception/.env.example for full variable reference.
