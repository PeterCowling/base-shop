name: Deploy Brikette (staging fast path)

# Fast-path staging deploy: no lint, typecheck, tests, or verify:* steps.
# Build + deploy run in a single job to eliminate artifact upload/download overhead.
# Use this for staging-only changes where CI validation gates are not needed.
# Production deploys always use the full brikette.yml path.

on:
  push:
    branches:
      - staging
    paths:
      - "apps/brikette/**"
      - "packages/design-system/**"
      - "packages/design-tokens/**"
      - "packages/guide-system/**"
      - "packages/guides-core/**"
      - "packages/next-config/**"
      - "packages/platform-core/**"
      - "packages/telemetry/**"
      - "packages/ui/**"
      - ".github/workflows/brikette-staging-fast.yml"
  workflow_dispatch:

concurrency:
  group: brikette-staging-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build + deploy (staging fast path)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: staging-pages
      url: https://staging.${{ vars.BRIKETTE_PAGES_PROJECT || 'brikette-website' }}.pages.dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-repo
        with:
          turbo-token: ${{ secrets.TURBO_TOKEN }}
          turbo-team: ${{ vars.TURBO_TEAM }}

      - name: Build workspace dependencies
        run: pnpm exec turbo run build --filter=@apps/brikette^...

      - name: Build Brikette static export
        # Hides routes incompatible with output:'export', builds, generates Cloudflare
        # redirects, strips Next.js metadata files, then unconditionally restores routes.
        # No verify:* steps — this is the fast path.
        shell: bash
        run: |
          cd apps/brikette
          mkdir -p ".tmp"
          [ -d "src/app/[lang]/guides/[...slug]" ] && mv "src/app/[lang]/guides/[...slug]" "src/app/[lang]/guides/_slug-off" || true
          [ -d "src/app/[lang]/guides/[slug]" ] && mv "src/app/[lang]/guides/[slug]" "src/app/[lang]/guides/_single-off" || true
          [ -d "src/app/[lang]/help/[slug]" ] && mv "src/app/[lang]/help/[slug]" "src/app/[lang]/help/_slug-off" || true
          [ -d "src/app/api" ] && mv "src/app/api" ".tmp/app-api-off" || true
          build_exit=0
          OUTPUT_EXPORT=1 \
            NEXT_PUBLIC_OUTPUT_EXPORT=1 \
            BRIKETTE_STAGING_LANGS="en,it" \
            NEXT_PUBLIC_GA_MEASUREMENT_ID="${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID_STAGING || vars.NEXT_PUBLIC_GA_MEASUREMENT_ID || '' }}" \
            pnpm build || build_exit=$?
          if [ "$build_exit" -eq 0 ]; then
            pnpm --filter @apps/brikette normalize:localized-routes || build_exit=$?
            pnpm --filter @apps/brikette generate:static-redirects || build_exit=$?
            find out -name "__next.*" -type f -delete
          fi
          [ -d ".tmp/app-api-off" ] && mv ".tmp/app-api-off" "src/app/api" || true
          [ -d "src/app/[lang]/guides/_slug-off" ] && mv "src/app/[lang]/guides/_slug-off" "src/app/[lang]/guides/[...slug]" || true
          [ -d "src/app/[lang]/guides/_single-off" ] && mv "src/app/[lang]/guides/_single-off" "src/app/[lang]/guides/[slug]" || true
          [ -d "src/app/[lang]/help/_slug-off" ] && mv "src/app/[lang]/help/_slug-off" "src/app/[lang]/help/[slug]" || true
          exit "$build_exit"

      - name: Deploy to Cloudflare Pages (staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/brikette
          pnpm exec wrangler pages deploy out \
            --project-name "${{ vars.BRIKETTE_PAGES_PROJECT || 'brikette-website' }}" \
            --branch staging
